{% set name = "climalab" %}
{% set version = "6.0.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv"

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68.0
    - wheel
  run:
    - python >=3.10
    - pip
    - numpy >=2.2.3
    - pandas >=2.2.3
    - xarray >=2024.2.0
    - netcdf4 >=1.6.0
    - matplotlib >=3.8.0
    - cartopy >=0.20.0
    - pyyaml >=6.0
    - cdsapi >=0.6.0
    - cfgrib >=0.9.0
    # climarraykit, filewise, pygenutils, paramlib: PyPI pins via post-link.sh

test:
  imports:
    - climalab
  commands:
    - python -c "import climalab; print(climalab.__version__)"

about:
  home: https://github.com/EusDancerDev/climalab
  license: MIT
  license_file: LICENSE
  summary: Climate and meteorology analysis with xarray, NetCDF, mapping, and CDS-style data access
  description: |
    climalab builds on xarray, NetCDF4, matplotlib, and cartopy for gridded climate workflows:
    diagnostics, reanalysis-style handling, and optional cfgrib or cdsapi-driven retrieval depending
    on the conda environment. It pairs with climarraykit for shared array patterns.
  doc_url: https://github.com/EusDancerDev/climalab#readme
  dev_url: https://github.com/EusDancerDev/climalab.git

extra:
  recipe-maintainers:
    - EusDancerDev
